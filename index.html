<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <div id="gridcontrols">
            <label for="x">Width</label>
            <input type="number" id="x">
            <br>
            <label for="y">Height</label>
            <input type="number" id="y">
            <br>
            <button type="button" onclick="createGrid()">Regenerate grid</button>
            <br>
        </div>
        <div id="grid">
        </div>
        <div id="startcontrols">
            <label for="xStart">Start x-coordinate</label>
            <input type="number" id="xStart">
            <br>
            <label for="yStart">Start y-coordinate</label>
            <input type="number" id="yStart">
            <br>
            <button type="submit">Submit start coords</button>
            <br>
        </div>
        <div id="endcontrols">
            <label for="xEnd">End x-coordinate</label>
            <input type="number" id="xEnd">
            <br>
            <label for="yEnd">End y-coordinate</label>
            <input type="number" id="yEnd">
            <br>
            <button type="submit">Submit end coords</button>
        </div>
        <button id="BFS">Use BFS</button>
        <button id="A*">Use A*</button>
        <div id="extra"></div>
    </body>
</html>
